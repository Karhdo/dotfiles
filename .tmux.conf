# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'fabioluciano/tmux-tokyo-night'

# Improve colors
set -g default-terminal 'screen-256color'

# Set scrollback buffer to 10000
set -g history-limit 10000

# Change action key
unbind C-b
set-option -g prefix C-t

# Switch panes
bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R

# Resize panes
bind  -r C-k resize-pane -U 5
bind  -r C-j resize-pane -D 5
bind  -r C-h resize-pane -L 5
bind  -r C-l resize-pane -R 5

# Enabling the mouse mode
setw -g mouse on

# Claude CLI floating popup (prefix + a)
# One long-lived `claude-<repo>` session PER git repo, derived from the
# pane's current path. Context is kept separate per project and survives
# closing/reopening the popup. Logic lives in the helper script so the
# binding stays readable. See: .config/tmux/claude-popup.sh
bind-key a display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  "$HOME/.config/tmux/claude-popup.sh"

# Toggle the popup with a single key, no prefix (Option/Alt + a):
#   - pressed in a normal session -> open the Claude popup
#   - pressed inside the popup (session name starts with `claude-`) -> detach (close)
# Requires WezTerm to send Alt for the left Option key
# (send_composed_key_when_left_alt_is_pressed = false in .wezterm.lua).
bind -n M-a if-shell -F '#{m:claude-*,#{session_name}}' \
  'detach-client' \
  'display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$HOME/.config/tmux/claude-popup.sh"'

# Run Tmux Plugin Manager
run '~/.tmux/plugins/tpm/tpm'

# Reload config (R = uppercase, r = lowercase — both work)
bind-key R source-file ~/.tmux.conf \; display-message "Config successfully reloaded"
bind-key r source-file ~/.tmux.conf \; display-message "Config successfully reloaded"
