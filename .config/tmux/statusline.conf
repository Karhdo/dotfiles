set -g mode-style "fg=#eee8d5,bg=#073642"

set -g message-style "fg=#eee8d5,bg=#073642"
set -g message-command-style "fg=#eee8d5,bg=#073642"

set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#eee8d5"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#586e75,bg=#073642"

set -g status-bg "#16161e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#16161e,bg=#7aa2f7, bold] #S #[fg=#7aa2f7,bg=#7aa2f7]#[fg=#7aa2f7,bg=#16161e]"

set -g status-right "#[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261] %H:%M %d-%b-%y #[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#15161E,bg=#7aa2f7,bold] #h "

setw -g window-status-activity-style "underscore,fg=#839496,bg=#16161e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#839496,bg=#16161e"
setw -g window-status-format '#[fg=#16161e,bg=#16161e]#[default] #I  #{b:pane_current_path} #[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#16161e,bg=#7aa2f7]#[fg=#16161e,bg=#7aa2f1] #I #[fg=#7aa2f7,bg=#3b4261] #[fg=#7aa2f7,bg=#3b4261] #{b:pane_current_path} #[fg=#3b4261,bg=#16161e,nobold]'
