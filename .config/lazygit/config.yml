os:
  # Open files in the parent Neovim session (the one lazygit was launched from
  # via toggleterm) instead of a nested nvim. Uses Neovim's native remote over
  # the $NVIM socket; falls back to a plain nvim when run outside Neovim.
  editPreset: 'nvim-remote'
  # Make the "open" action (o) also open in the parent Neovim session instead of
  # the macOS default app (VSCode). Same $NVIM-socket logic as the edit preset.
  open: '[ -z "$NVIM" ] && nvim -- {{filename}} || nvim --server "$NVIM" --remote-tab {{filename}}'
  openDirInEditor: '[ -z "$NVIM" ] && nvim -- {{dir}} || nvim --server "$NVIM" --remote-tab {{dir}}'
